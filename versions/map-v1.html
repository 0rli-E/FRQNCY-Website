      --blue-mid: #2952B3; --blue-bright: #4A7AE8;

    /* Human dot pulse animation */
    @keyframes humanPulse {
      0%   { opacity: 0.65; r: 6px; }
      50%  { opacity: 1;    r: 8px; }
      100% { opacity: 0.65; r: 6px; }
    }
    @keyframes humanGlowPulse {
      0%   { opacity: 0.25; }
      50%  { opacity: 0.55; }
      100% { opacity: 0.25; }
    }
    .human-dot { animation: humanPulse 3s ease-in-out infinite; }
    .human-glow { animation: humanGlowPulse 3s ease-in-out infinite; }

    /* Passion link glow lines */
    .passion-link {
      stroke: rgba(255,255,255,0.32);
      stroke-width: 1.2;
    }

    #tooltip {
      position:fixed; z-index:10; background:rgba(11,28,61,0.93);
      border:1px solid var(--gold); border-radius:8px; padding:10px 16px;
      color:var(--white); font-family:var(--font-body); font-size:12px;
      pointer-events:none; opacity:0; transition:opacity 0.2s;
      max-width:210px; backdrop-filter:blur(8px);
    }
    #tooltip .tip-title { font-family:var(--font-display); font-size:16px; color:var(--gold-light); margin-bottom:3px; }
    #tooltip .tip-type  { font-size:9px; letter-spacing:0.18em; color:rgba(255,255,255,0.4); text-transform:uppercase; }

    #ui-overlay {
      position:fixed; top:24px; left:50%; transform:translateX(-50%);
      z-index:5; text-align:center; pointer-events:none;
    }
    #ui-overlay h1 { font-family:var(--font-display); font-size:clamp(20px,2.5vw,30px); font-weight:300; letter-spacing:0.35em; color:var(--gold); }
    #ui-overlay p  { font-size:10px; letter-spacing:0.2em; color:rgba(255,255,255,0.32); margin-top:5px; }

    #back-btn {

      z-index:5; background:transparent; border:1px solid rgba(196,151,58,0.35);
      color:rgba(196,151,58,0.65); font-family:var(--font-body); font-size:10px;

    .leg-dot  { border-radius:50%; flex-shrink:0; }

(function(){
  const c = document.getElementById('stars-canvas');
  const ctx = c.getContext('2d');
  let stars = [];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function initStars(){
    stars=[];
    for(let i=0;i<340;i++) stars.push({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+0.2,a:Math.random()*0.6+0.1});
  }
  function drawStars(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,255,255,${s.a})`; ctx.fill(); });
  }
  window.addEventListener('resize',()=>{ resize(); initStars(); drawStars(); });
  resize(); initStars(); drawStars();
})();

    LINKS.push(link);
    DOT_LINKS.push(link);
  }
});

// White glow gradient for human dots
const humanGrad = defs.append('radialGradient').attr('id','grad-human').attr('cx','40%').attr('cy','35%');
humanGrad.append('stop').attr('offset','0%').attr('stop-color','#FFFFFF');
humanGrad.append('stop').attr('offset','100%').attr('stop-color','rgba(200,220,255,0.7)');

// Glow filters
[
  {id:'glow-gold',    dev:10},
  {id:'glow-blue',    dev:12},
  {id:'glow-cluster', dev:7 },
  {id:'glow-soft',    dev:5 },
  {id:'glow-human',   dev:6 },
].forEach(g=>{
  const f = defs.append('filter').attr('id',g.id)
    .attr('x','-80%').attr('y','-80%').attr('width','260%').attr('height','260%');
  f.append('feGaussianBlur').attr('stdDeviation',g.dev).attr('result','blur');
  const fm = f.append('feMerge');
  fm.append('feMergeNode').attr('in','blur');
  fm.append('feMergeNode').attr('in','SourceGraphic');
});

// Passion link filter — warm white soft blur
const pf = defs.append('filter').attr('id','glow-passion')
  .attr('x','-50%').attr('y','-50%').attr('width','200%').attr('height','200%');
pf.append('feGaussianBlur').attr('stdDeviation',2).attr('result','blur');
const pfm = pf.append('feMerge');
pfm.append('feMergeNode').attr('in','blur');
pfm.append('feMergeNode').attr('in','SourceGraphic');

/* ── Zoom ── */
const zoomG = svg.append('g');
svg.call(d3.zoom().scaleExtent([0.1,3.5]).on('zoom', e=>zoomG.attr('transform',e.transform)));

/* ── Simulation ── */
const sim = d3.forceSimulation(NODES)
  .force('link', d3.forceLink(LINKS).id(d=>d.id)
    .distance(d=>{
      const s=d.source.type||'topic', t=d.target.type||'topic';
      if(d.isPassion) return 100;
      if(s==='core'||t==='core') return (t==='main'||s==='main')?210:260;
      if(s==='main'||t==='main') return 175;
      if(s==='cluster'||t==='cluster') return (t==='topic'||s==='topic')?110:145;
      return 85;
    })
    .strength(d=>{
      if(d.isPassion) return 0.22;
      const s=d.source.type||'topic', t=d.target.type||'topic';
      if(s==='core'||t==='core') return 0.55;
      return 0.38;
    })
  )
  .force('charge', d3.forceManyBody().strength(d=>{
    switch(d.type){
      case 'core':    return -1600;
      case 'main':    return -750;
      case 'cluster': return -400;
      case 'topic':   return -130;
      case 'dot':     return -20;
      default:        return -80;
    }
  }))
  .force('center', d3.forceCenter(W/2, H/2).strength(0.04))
  .force('collide', d3.forceCollide(d=>d.r+(d.type==='dot'?12:9)).strength(0.7))
  .alphaDecay(0.022)
  .velocityDecay(0.4);

/* ── Render layers (order matters for z-depth) ── */

// 1. Passion links (behind everything, subtle glow)
const passionLinkG = zoomG.append('g').attr('class','passion-links');
const passionLinkSel = passionLinkG.selectAll('line')
  .data(LINKS.filter(l=>l.isPassion))
  .join('line')
  .attr('stroke','rgba(255,255,255,0.28)')
  .attr('stroke-width',0.9)
  .attr('filter','url(#glow-passion)');

// 2. Structural links
const linkG = zoomG.append('g').attr('class','struct-links');
const linkSel = linkG.selectAll('line')
  .data(LINKS.filter(l=>!l.isPassion))
  .join('line')
  .attr('stroke', d=>{
    const s=typeof d.source==='object'?d.source.type:'x';
    const t=typeof d.target==='object'?d.target.type:'x';
    if(s==='core'||t==='core') return 'rgba(196,151,58,0.48)';
    if(s==='main'||t==='main') return 'rgba(74,122,232,0.32)';
    return 'rgba(41,82,179,0.2)';
  })
  .attr('stroke-width', d=>{
    const s=typeof d.source==='object'?d.source.type:'x';
    if(s==='core') return 1.8;
    if(s==='main') return 1.2;
    return 0.75;
  });

// 3. Human dot nodes (drawn BEFORE topic nodes so they sit behind)
const dotG = zoomG.append('g').attr('class','dot-nodes');
const dotSel = dotG.selectAll('g.dot')
  .data(NODES.filter(n=>n.type==='dot'))
  .join('g').attr('class','dot').style('cursor','default');

// Outer glow ring (pulsing via CSS)
dotSel.append('circle')
  .attr('r', d=>d.r+9)
  .attr('fill','rgba(255,255,255,0.07)')
  .attr('stroke','rgba(255,255,255,0.18)')
  .attr('stroke-width',0.8)
  .attr('class','human-glow')
  .style('animation-delay', d=>`${d.pulseOffset}s`);

// White core dot
dotSel.append('circle')
  .attr('r', d=>d.r)
  .attr('fill','url(#grad-human)')
  .attr('stroke','rgba(255,255,255,0.5)')
  .attr('stroke-width',0.6)
  .attr('filter','url(#glow-human)')
  .attr('class','human-dot')
  .style('animation-delay', d=>`${d.pulseOffset}s`);

// 4. Topic/cluster/core/main nodes
const nodeG = zoomG.append('g').attr('class','topic-nodes');
const nodeSel = nodeG.selectAll('g.node')
  .data(NODES.filter(n=>n.type!=='dot'))
  .join('g').attr('class','node').style('cursor','pointer');

// Outer glow ring
nodeSel.filter(d=>d.type==='core'||d.type==='main'||d.type==='cluster')
  .append('circle')
  .attr('r', d=>d.r+(d.type==='core'?22:d.type==='main'?14:9))
  .attr('fill','none')
  .attr('filter', d=>d.type==='core'?'url(#glow-gold)':d.type==='main'?'url(#glow-blue)':'url(#glow-cluster)')
  .attr('stroke', d=>d.type==='core'?'rgba(196,151,58,0.28)':d.type==='main'?'rgba(74,122,232,0.2)':'rgba(41,82,179,0.12)')
  .attr('stroke-width', d=>d.type==='core'?2.5:1.5);

// Topic subtle glow
nodeSel.filter(d=>d.type==='topic')
  .append('circle')
  .attr('r', d=>d.r+5)
  .attr('fill','none')
  .attr('filter','url(#glow-soft)')
  .attr('stroke','rgba(41,82,179,0.1)')
  .attr('stroke-width',0.5);

// Main body
nodeSel.append('circle')
  .attr('r', d=>d.r)
  .attr('fill', d=>`url(#grad-${d.type==='cluster'?'cluster':d.type==='topic'?'topic':d.type})`)
  .attr('stroke', d=>{
    if(d.type==='core')    return '#E8C97D';
    if(d.type==='main')    return '#4A7AE8';
    if(d.type==='cluster') return '#2952B3';
    return '#1A3A8F';
  })
  .attr('stroke-width', d=>d.type==='core'?2.5:1);

// Labels
nodeSel.append('text')
  .attr('text-anchor','middle')
  .attr('dominant-baseline','central')
  .attr('fill', d=>{
    if(d.type==='core')    return '#0B1C3D';
    if(d.type==='main')    return '#FFFFFF';
    if(d.type==='cluster') return '#E8C97D';
    return 'rgba(180,212,255,0.88)';
  })
  .attr('font-family', d=>(d.type==='core'||d.type==='main')?'Cormorant, Georgia, serif':"'Jost', sans-serif")
  .attr('font-size', d=>d.type==='core'?'15px':d.type==='main'?'10.5px':d.type==='cluster'?'9.5px':'8px')
  .attr('font-weight', d=>d.type==='core'?'500':'300')
  .attr('letter-spacing', d=>d.type==='core'?'0.18em':'0.04em')
  .attr('pointer-events','none')
  .each(function(d){
    const el = d3.select(this);
    if(d.type==='topic' && d.label.length>14){
      const words = d.label.split(' ');
      const mid = Math.ceil(words.length/2);
      el.append('tspan').attr('x',0).attr('dy','-0.5em').text(words.slice(0,mid).join(' '));
      el.append('tspan').attr('x',0).attr('dy','1em').text(words.slice(mid).join(' '));
    } else {
      el.text(d.label);
    }
  });

/* ── Drag (all nodes) ── */
const allNodeSel = d3.selectAll('#map-svg g.node, #map-svg g.dot');
allNodeSel.call(
  d3.drag()
    .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
    .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
    .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
);

/* ── Tooltip ── */
const tip = document.getElementById('tooltip');
const typeLabels = {core:'FRQNCY CORE',main:'PILLAR',cluster:'DOMAIN',topic:'TOPIC'};

nodeSel
  .on('mouseover',(e,d)=>{
    tip.querySelector('.tip-title').textContent = d.label;
    tip.querySelector('.tip-type').textContent = (d.desc||'')+' · '+typeLabels[d.type];
    tip.style.opacity=1;
    const connected = new Set([d.id]);
    LINKS.forEach(l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      if(s===d.id) connected.add(t);
      if(t===d.id) connected.add(s);
    });
    nodeSel.style('opacity',n=>connected.has(n.id)?1:0.06);
    dotSel.style('opacity',0.08);
    passionLinkSel.style('opacity',0.04);
    linkSel.style('opacity',l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return (s===d.id||t===d.id)?0.9:0.03;
    });
  })
  .on('mousemove',e=>{ tip.style.left=(e.clientX+18)+'px'; tip.style.top=(e.clientY-14)+'px'; })
  .on('mouseout',()=>{
    tip.style.opacity=0;
    nodeSel.style('opacity',1);
    dotSel.style('opacity',1);
    passionLinkSel.style('opacity',1);
    linkSel.style('opacity',1);
  });

/* ── Tick ── */
sim.on('tick',()=>{
  // Structural links
  linkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  // Passion links
  passionLinkSel
    .attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
    .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  // Dot nodes
  dotSel.attr('transform',d=>`translate(${d.x},${d.y})`);
  // Topic/main/core nodes
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

/* ── Pulse signals along structural links ── */
const majorLinks = LINKS.filter(l=>!l.isPassion).filter(l=>{
  const s=typeof l.source==='object'?l.source.type:'x';
  return s==='core'||s==='main';
});

function fireSignal(){
  if(!majorLinks.length) return;
  const l = majorLinks[Math.floor(Math.random()*majorLinks.length)];
  const s=l.source, t=l.target;
  if(!s||!t||s.x===undefined) return;
  zoomG.append('circle')
    .attr('r',2.2).attr('fill','rgba(240,208,100,0.9)').attr('pointer-events','none')
    .transition().duration(1100).ease(d3.easeLinear)
    .attrTween('cx',()=>d3.interpolateNumber(s.x,t.x))
    .attrTween('cy',()=>d3.interpolateNumber(s.y,t.y))
    .on('end',function(){ d3.select(this).remove(); });
}

/* ── Pulse signals along passion links (human → topic) ── */
function firePassionSignal(){
  const pl = LINKS.filter(l=>l.isPassion);
  if(!pl.length) return;
  const l = pl[Math.floor(Math.random()*pl.length)];
  const s=l.source, t=l.target;
  if(!s||!t||s.x===undefined) return;
  // Determine forward/backward randomly for organic feel
  const fwd = Math.random()>0.5;
  const sx = fwd?s.x:t.x, sy = fwd?s.y:t.y;
  const tx = fwd?t.x:s.x, ty = fwd?t.y:s.y;
  zoomG.append('circle')
    .attr('r',1.5).attr('fill','rgba(255,255,255,0.75)').attr('pointer-events','none')
    .transition().duration(900).ease(d3.easeQuadInOut)
    .attrTween('cx',()=>d3.interpolateNumber(sx,tx))
    .attrTween('cy',()=>d3.interpolateNumber(sy,ty))
    .style('opacity',0)
    .on('end',function(){ d3.select(this).remove(); });
}

// Start after sim warms up
setTimeout(()=>{
  setInterval(fireSignal,        270);
  setInterval(firePassionSignal, 180); // faster — humans are always interacting
}, 2500);
</script>
</body>
</html>
