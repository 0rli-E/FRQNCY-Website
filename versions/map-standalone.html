    #map-svg:active { cursor:grabbing; }
    #tooltip {
      position:fixed; z-index:10; background:rgba(11,28,61,0.93);
      border:1px solid var(--gold); border-radius:8px; padding:10px 16px;
      color:#fff; font-family:var(--font-body); font-size:12px;
      pointer-events:none; opacity:0; transition:opacity 0.2s; max-width:210px; backdrop-filter:blur(8px);
    }
    #tooltip .tip-title { font-family:var(--font-display); font-size:17px; color:var(--gold-light); margin-bottom:3px; }
    #tooltip .tip-type  { font-size:9px; letter-spacing:0.16em; color:rgba(255,255,255,0.38); text-transform:uppercase; }
    #ui-overlay { position:fixed; top:24px; left:50%; transform:translateX(-50%); z-index:5; text-align:center; pointer-events:none; }
    #ui-overlay h1 { font-family:var(--font-display); font-size:clamp(20px,2.5vw,30px); font-weight:300; letter-spacing:0.35em; color:var(--gold); }
    #ui-overlay p  { font-size:10px; letter-spacing:0.2em; color:rgba(255,255,255,0.3); margin-top:5px; }
    #back-btn {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:5;
      background:transparent; border:1px solid rgba(196,151,58,0.3); color:rgba(196,151,58,0.58);
      font-family:var(--font-body); font-size:10px; letter-spacing:0.22em;
      padding:10px 26px; cursor:pointer; border-radius:2px; transition:all 0.3s;
    }
    #back-btn:hover { border-color:var(--gold); color:var(--gold); background:rgba(196,151,58,0.05); }
    #node-count { position:fixed; bottom:28px; right:28px; z-index:5; font-size:10px; letter-spacing:0.12em; color:rgba(255,255,255,0.18); }
    #legend { position:fixed; top:90px; right:24px; z-index:5; display:flex; flex-direction:column; gap:9px; }

  ["t-cuisine","t-community"],["t-renewable","t-climate"],["t-solar","t-renewable"],
  ["t-wind","t-renewable"],["t-bioenergy","t-renewable"],["t-energypolicy","t-governance"],
  ["t-gridtech","t-systems"],["t-storage","t-gridtech"],
  ["t-language","t-story"],["t-journalism","t-socialmov"],["t-nvc","t-peace"],
  ["t-socialmedia","t-collective"],["t-dialogue","t-peace"],["t-broadcasting","t-journalism"],
  ["t-sports","t-movement"],["t-festivals","t-community"],["t-gaming","t-ai"],
  ["t-esports","t-gaming"],["t-playcreat","t-cocreate"],["t-outdoor","t-ecology"],
  ["t-leisure","t-mentalhlth"],["t-humor","t-story"],
];
const LINKS=RAW.map(([s,t])=>({source:s,target:t}));

document.getElementById('node-count').textContent=`${NODES.length} nodes · 1000 humans`;

/* ── Embedded mode: hide standalone UI chrome when inside an iframe ── */
const isEmbedded = (()=>{ try{ return window.self !== window.top; }catch(e){ return true; } })();
if(isEmbedded){
  ['back-btn','legend','ui-overlay','node-count'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.style.display='none';
  });
}

/* ──────────── CANVAS ──────────── */
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

/* Background stars */
const STARS=[];
for(let i=0;i<120;i++) STARS.push({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.3+0.2, base:Math.random()*0.45+0.08, phase:Math.random()*Math.PI*2
});

/* ──────────── SVG / D3 ──────────── */
const W=innerWidth, H=innerHeight;
const svg=d3.select('#map-svg');
const defs=d3.select('#svg-defs');

[
  {id:'g-core',    c1:'#F4DC88',c2:'#A06818'},
  {id:'g-main',    c1:'#5A8AFF',c2:'#122878'},
  {id:'g-cluster', c1:'#3062C8',c2:'#081640'},
  {id:'g-topic',   c1:'#213E88',c2:'#060E24'},
].forEach(g=>{
  const gr=defs.append('radialGradient').attr('id',g.id).attr('cx','38%').attr('cy','30%');
  gr.append('stop').attr('offset','0%').attr('stop-color',g.c1);
  gr.append('stop').attr('offset','100%').attr('stop-color',g.c2);
});

let zoomState={x:0,y:0,k:1};
const zoomG=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>{
  zoomG.attr('transform',e.transform);
  zoomState=e.transform;
}));

const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(LINKS).id(d=>d.id)
    .distance(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return (t==='main'||s==='main')?210:258;
      if(s==='main'||t==='main') return 178;
      if(s==='cluster'||t==='cluster') return (t==='topic'||s==='topic')?112:148;
      return 84;
    })
    .strength(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return 0.55;
      return 0.38;
    })
  )
  .force('charge',d3.forceManyBody().strength(d=>{
    switch(d.type){
      case 'core': return -1600; case 'main': return -750;
      case 'cluster': return -400; default: return -130;
    }
  }).theta(0.9))
  .force('center',d3.forceCenter(W/2,H/2).strength(0.04))
  .force('collide',d3.forceCollide(d=>d.r+8).strength(0.6).iterations(1))
  .alphaDecay(0.03).velocityDecay(0.45);

/* Node map for fast canvas lookup */
const nodeById={};
NODES.forEach(n=>{ nodeById[n.id]=n; });

/* ──────────── 1000 HUMAN STARS (canvas-only, no simulation) ──────────── */
// Anchor each star to a topic or cluster node with a random offset.
// Position = anchor.x + offsetX, anchor.y + offsetY each frame — zero cost.
const topicPool=NODES.filter(n=>n.type==='topic'||n.type==='cluster');

function srand(seed){ let x=seed; return ()=>{ x=((x^(x<<13))^(x>>7)^(x<<17))>>>0; return (x%100000)/100000; }; }

const HUMANS=[];
for(let i=0;i<1000;i++){
  const rnd=srand(i*31337+i*i+1);
  // Bias toward topics (more spread across leaves)
  const anchor=topicPool[Math.floor(rnd()*topicPool.length)];
  const dist=anchor.r + 8 + rnd()*55;   // cluster near but not inside node
  const angle=rnd()*Math.PI*2;
  HUMANS.push({
    anchorId: anchor.id,
    ox: Math.cos(angle)*dist,
    oy: Math.sin(angle)*dist,
    r: 0.7 + rnd()*0.8,           // 0.7–1.5px — tiny but visible
    baseAlpha: 0.55 + rnd()*0.40, // 0.55–0.95 — bright enough to be distinct from bg stars
    phase: rnd()*Math.PI*2,
    speed: 1.4 + rnd()*1.2,      // twinkle speed
    // store a second anchor for the faint connection line (same as anchor for simplicity)
    lineAlpha: 0.04 + rnd()*0.06,
    showLine: rnd()<0.45,         // only ~45% have visible lines (reduces clutter)
  });
}

/* ── SVG nodes (no dot nodes here) ── */
const nodeG=zoomG.append('g');
const nodeSel=nodeG.selectAll('g.node').data(NODES).join('g').attr('class','node').style('cursor','pointer');

nodeSel.append('circle')
  .attr('r',d=>d.r)
  .attr('fill',d=>d.type==='cluster'?'url(#g-cluster)':d.type==='topic'?'url(#g-topic)':`url(#g-${d.type})`)
  .attr('stroke',d=>d.type==='core'?'#E0C06A':d.type==='main'?'#4A7AE8':d.type==='cluster'?'#2952B3':'#1A3A8F')
  .attr('stroke-width',d=>d.type==='core'?2.5:1);

nodeSel.filter(d=>d.type!=='dot').append('text')
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill',d=>d.type==='core'?'#0A1220':d.type==='main'?'#FFFFFF':d.type==='cluster'?'#E8C97D':'rgba(172,202,255,0.88)')
  .attr('font-family',d=>(d.type==='core'||d.type==='main')?'Cormorant,Georgia,serif':"'Jost',sans-serif")
  .attr('font-size',d=>d.type==='core'?'15px':d.type==='main'?'10.5px':d.type==='cluster'?'9.5px':'8px')
  .attr('font-weight',d=>d.type==='core'?'500':'300')
  .attr('letter-spacing',d=>d.type==='core'?'0.18em':'0.04em')
  .attr('pointer-events','none')
  .each(function(d){
    const el=d3.select(this);
    if(d.type==='topic'&&d.label.length>14){
      const w=d.label.split(' '),m=Math.ceil(w.length/2);
      el.append('tspan').attr('x',0).attr('dy','-0.5em').text(w.slice(0,m).join(' '));
      el.append('tspan').attr('x',0).attr('dy','1em').text(w.slice(m).join(' '));
    } else { el.text(d.label); }
  });

nodeSel.call(d3.drag()
  .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
  .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
);

sim.on('tick',()=>{ nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`); });

/* ── Hover ── */
const tip=document.getElementById('tooltip');
let hoveredNodeIds=null;

nodeSel
  .on('mouseover',(e,d)=>{
    const conn=new Set([d.id]);
    LINKS.forEach(l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      if(s===d.id) conn.add(t); if(t===d.id) conn.add(s);
    });
    hoveredNodeIds=conn;
    nodeSel.style('opacity',n=>conn.has(n.id)?1:0.05);
    tip.querySelector('.tip-title').textContent=d.label;
    tip.querySelector('.tip-type').textContent=(d.desc||'')+' · '+({core:'FRQNCY CORE',main:'PILLAR',cluster:'DOMAIN',topic:'TOPIC'}[d.type]||'');
    tip.style.opacity=1;
  })
  .on('mousemove',e=>{ tip.style.left=(e.clientX+18)+'px'; tip.style.top=(e.clientY-14)+'px'; })
  .on('mouseout',()=>{ tip.style.opacity=0; hoveredNodeIds=null; nodeSel.style('opacity',1); });

/* ──────────── RENDER LOOP (canvas) ──────────── */
const particles=[];
let dashOff=0, lastMajor=0, lastDotPulse=0;

const regLinks=LINKS;
const majorLinks=LINKS.filter(l=>{
  const s=typeof l.source==='object'?l.source.type:null;
  return s==='core'||s==='main';
});

function spawnParticle(fromDot){
  if(fromDot){
    // Pick a random human and send pulse toward its anchor
    const h=HUMANS[Math.floor(Math.random()*HUMANS.length)];
    const a=nodeById[h.anchorId];
    if(!a||a.x===undefined) return;
    const hx=a.x+h.ox, hy=a.y+h.oy;
    const fwd=Math.random()>0.4;
    particles.push({x1:fwd?hx:a.x, y1:fwd?hy:a.y, x2:fwd?a.x:hx, y2:fwd?a.y:hy,
      prog:0, speed:0.013+Math.random()*0.01, isDot:true});
  } else {
    const l=majorLinks[Math.floor(Math.random()*majorLinks.length)];
    const s=l.source,t=l.target;
    if(!s||!t||s.x===undefined) return;
    particles.push({x1:s.x,y1:s.y,x2:t.x,y2:t.y,
      prog:0, speed:0.009+Math.random()*0.006, isDot:false});
  }
}

function render(ts){
  requestAnimationFrame(render);
  const CW=canvas.width, CH=canvas.height;
  ctx.clearRect(0,0,CW,CH);

  /* Background stars */
  const t=ts*0.0007;
  for(let i=0;i<STARS.length;i++){
    const s=STARS[i];
    const a=s.base*(0.65+0.35*Math.sin(t+s.phase));
    ctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }

  /* Spawn particles */
  if(ts-lastMajor>320){ spawnParticle(false); lastMajor=ts; }
  if(ts-lastDotPulse>90){ spawnParticle(true); lastDotPulse=ts; }  // frequent for humans

  /* Apply zoom transform */
  const {x:zx,y:zy,k:zk}=zoomState;
  ctx.save();
  ctx.translate(zx,zy); ctx.scale(zk,zk);

  /* ── Network links (batched by tier) ── */
  ctx.setLineDash([]);

  ctx.strokeStyle='rgba(196,151,58,0.42)'; ctx.lineWidth=1.8;
  ctx.beginPath();
  regLinks.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined) return;
    if(s.type!=='core'&&t_.type!=='core') return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  ctx.strokeStyle='rgba(74,122,232,0.25)'; ctx.lineWidth=1.1;
  ctx.beginPath();
  regLinks.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined) return;
    if((s.type!=='main'&&t_.type!=='main')||(s.type==='core'||t_.type==='core')) return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  ctx.strokeStyle='rgba(41,82,179,0.13)'; ctx.lineWidth=0.55;
  ctx.beginPath();
  regLinks.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined) return;
    if(s.type==='core'||t_.type==='core'||s.type==='main'||t_.type==='main') return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  /* ── Node glows (canvas radial, no SVG filter) ── */
  NODES.forEach(n=>{
    if(!n.x) return;
    if(n.type==='core'){
      const g=ctx.createRadialGradient(n.x,n.y,n.r*0.6,n.x,n.y,n.r*2.4);
      g.addColorStop(0,'rgba(196,151,58,0.2)'); g.addColorStop(1,'rgba(196,151,58,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*2.4,0,Math.PI*2); ctx.fill();
    } else if(n.type==='main'){
      const g=ctx.createRadialGradient(n.x,n.y,n.r*0.5,n.x,n.y,n.r*1.9);
      g.addColorStop(0,'rgba(74,122,232,0.16)'); g.addColorStop(1,'rgba(74,122,232,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*1.9,0,Math.PI*2); ctx.fill();
    }
  });

  /* ── 1000 human stars ── */
  // Connection threads — batch into one path per opacity band to avoid per-line strokeStyle calls
  const lineGroups = [{a:0.10,lines:[]},{a:0.07,lines:[]},{a:0.04,lines:[]}];
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i];
    if(!h.showLine) continue;
    const a=nodeById[h.anchorId];
    if(!a||a.x===undefined) continue;
    if(hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId)) continue;
    const hx=a.x+h.ox, hy=a.y+h.oy;
    const g = h.lineAlpha > 0.08 ? lineGroups[0] : h.lineAlpha > 0.055 ? lineGroups[1] : lineGroups[2];
    g.lines.push(hx,hy,a.x,a.y);
  }
  ctx.lineWidth=0.4;
  lineGroups.forEach(g=>{
    if(!g.lines.length) return;
    ctx.strokeStyle=`rgba(190,215,255,${g.a})`;
    ctx.beginPath();
    for(let j=0;j<g.lines.length;j+=4){ ctx.moveTo(g.lines[j],g.lines[j+1]); ctx.lineTo(g.lines[j+2],g.lines[j+3]); }
    ctx.stroke();
  });

  // Star bodies — two-pass: soft outer glow then bright core
  // Pass 1: glow halos (larger radius, low alpha) — drawn first so cores sit on top
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i];
    const a=nodeById[h.anchorId];
    if(!a||a.x===undefined) continue;
    const hx=a.x+h.ox, hy=a.y+h.oy;
    const twinkle=0.55+0.45*Math.sin(ts*0.001*h.speed+h.phase);
    const dimmed=hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId);
    const alpha=dimmed?0.02:h.baseAlpha*twinkle;
    // Soft halo
    ctx.fillStyle=`rgba(220,235,255,${(alpha*0.25).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r*3.5,0,Math.PI*2); ctx.fill();
  }
  // Pass 2: bright core dots
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i];
    const a=nodeById[h.anchorId];
    if(!a||a.x===undefined) continue;
    const hx=a.x+h.ox, hy=a.y+h.oy;
    const twinkle=0.55+0.45*Math.sin(ts*0.001*h.speed+h.phase);
    const dimmed=hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId);
    const alpha=dimmed?0.04:h.baseAlpha*twinkle;
    ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r,0,Math.PI*2); ctx.fill();
  }

  /* ── Particles ── */
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.prog+=p.speed;
    if(p.prog>=1){ particles.splice(i,1); continue; }
    const px=p.x1+(p.x2-p.x1)*p.prog;
    const py=p.y1+(p.y2-p.y1)*p.prog;
    const fade=Math.min(p.prog*5,1)*Math.min((1-p.prog)*5,1);
    ctx.fillStyle=p.isDot
      ?`rgba(210,230,255,${(0.75*fade).toFixed(2)})`
      :`rgba(240,210,95,${(0.9*fade).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(px,py,p.isDot?1.0:2.0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

requestAnimationFrame(render);
</script>
</body>
</html>
