    #ui-overlay {
      position:fixed; top:28px; left:50%; transform:translateX(-50%);
      z-index:5; text-align:center; pointer-events:none;
    }
    #ui-overlay h1 {
      font-family:var(--font-display); font-size:clamp(18px,2.2vw,28px);
      font-weight:300; letter-spacing:0.5em; color:rgba(196,151,58,0.65);

    #ui-sub {

      z-index:5; text-align:center; pointer-events:none;

      font-style:italic; color:rgba(196,151,58,0.22); letter-spacing:0.2em; white-space:nowrap;
    }
    #tooltip {
      position:fixed; z-index:10; background:rgba(6,12,32,0.96);
      border:1px solid rgba(196,151,58,0.45); border-radius:6px; padding:12px 18px;

    }
    .tip-title { font-family:var(--font-display); font-size:18px; color:var(--gold-light); margin-bottom:4px; }
    .tip-type  { font-size:9px; letter-spacing:0.16em; color:rgba(255,255,255,0.35); text-transform:uppercase; }

/* ── CANVAS ── */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,cx,cy,scale=1,panX=0,panY=0;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  cx=W/2; cy=H/2;
  buildLayout();
}

/* ── LAYOUT — concentric rings ── */
const nodeMap={};   // id → node with x,y
let allNodes=[];
let hovered=null;

function buildLayout(){
  allNodes=[];
  nodeMap['__center']={id:'__center',x:cx,y:cy,r:0,type:'center'};

  const nP=PILLARS.length;
  const pillarR=Math.min(W,H)*0.16;

  PILLARS.forEach((p,i)=>{
    const angle=(i/nP)*Math.PI*2 - Math.PI/2;
    const x=cx+Math.cos(angle)*pillarR;
    const y=cy+Math.sin(angle)*pillarR;
    const n={...p, x, y, r:28, type:'pillar', angle};
    nodeMap[p.id]=n; allNodes.push(n);
  });

  // Domains: cluster around their pillar, second ring
  const domainR=Math.min(W,H)*0.34;
  const domainsByPillar={};
  DOMAINS.forEach(d=>{ (domainsByPillar[d.pillar]||(domainsByPillar[d.pillar]=[])).push(d); });

  PILLARS.forEach((p,pi)=>{
    const doms=domainsByPillar[p.id]||[];
    const pAngle=(pi/nP)*Math.PI*2 - Math.PI/2;
    const spread=Math.PI*0.38;
    doms.forEach((d,di)=>{
      const offset=(doms.length>1?(di/(doms.length-1)-0.5)*spread:0);
      const angle=pAngle+offset;
      const x=cx+Math.cos(angle)*domainR;
      const y=cy+Math.sin(angle)*domainR;
      const n={...d, x, y, r:18, type:'domain', angle, pillarId:d.pillar};
      nodeMap[d.id]=n; allNodes.push(n);
    });
  });

  // Topics: radiate from their domain, outer ring
  const topicsByDomain={};
  TOPICS.forEach(t=>{ (topicsByDomain[t.domain]||(topicsByDomain[t.domain]=[])).push(t); });

  DOMAINS.forEach(d=>{
    const dn=nodeMap[d.id]; if(!dn) return;
    const tops=topicsByDomain[d.id]||[];
    const dAngle=dn.angle;
    const topicR=Math.min(W,H)*0.495;
    const spread=Math.PI*0.22;
    tops.forEach((t,ti)=>{
      const offset=tops.length>1?(ti/(tops.length-1)-0.5)*spread:0;
      const angle=dAngle+offset;
      const r2=topicR+(ti%2)*18;
      const x=cx+Math.cos(angle)*r2;
      const y=cy+Math.sin(angle)*r2;
      const n={...t, x, y, r:9, type:'topic', angle};
      nodeMap[t.id]=n; allNodes.push(n);
    });
  });
}

/* ── ZOOM / PAN ── */
let dragging=false, lastMx=0, lastMy=0;
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const delta=e.deltaY>0?0.92:1.09;
  scale=Math.max(0.15,Math.min(4,scale*delta));
});
canvas.addEventListener('mousedown',e=>{ dragging=true; lastMx=e.clientX; lastMy=e.clientY; });
canvas.addEventListener('mousemove',e=>{
  if(dragging){ panX+=e.clientX-lastMx; panY+=e.clientY-lastMy; lastMx=e.clientX; lastMy=e.clientY; }
  // Hover detection
  const mx=(e.clientX-cx-panX)/scale+cx;
  const my=(e.clientY-cy-panY)/scale+cy;
  let found=null;
  for(let i=allNodes.length-1;i>=0;i--){
    const n=allNodes[i];
    const dx=mx-n.x, dy=my-n.y;
    if(Math.sqrt(dx*dx+dy*dy)<n.r+4){ found=n; break; }
  }
  hovered=found;
  const tip=document.getElementById('tooltip');
  if(found){
    tip.querySelector('.tip-title').textContent=found.label;
    const typeLabel={pillar:'PILLAR',domain:'DOMAIN',topic:'TOPIC'}[found.type]||'';
    tip.querySelector('.tip-type').textContent=(found.desc||'')+' · '+typeLabel;
    tip.style.opacity=1;
    tip.style.left=(e.clientX+16)+'px';
    tip.style.top=(e.clientY-14)+'px';
  } else { tip.style.opacity=0; }
});
canvas.addEventListener('mouseup',()=>{ dragging=false; });
canvas.addEventListener('mouseleave',()=>{ dragging=false; document.getElementById('tooltip').style.opacity=0; });

/* ── STARS ── */
const STARS=[];
for(let i=0;i<180;i++) STARS.push({
  x:Math.random()*3000-500, y:Math.random()*2000-300,
  r:Math.random()*1.1+0.1, base:Math.random()*0.38+0.05, phase:Math.random()*Math.PI*2
});

/* ── HUMANS ── */
const HUMANS=[];
function srand(seed){ let x=seed; return ()=>{ x=((x^(x<<13))^(x>>7)^(x<<17))>>>0; return (x%100000)/100000; }; }
for(let i=0;i<800;i++){
  const rnd=srand(i*31337+i*i+1);
  const pool=TOPICS;
  const anchor=pool[Math.floor(rnd()*pool.length)];
  const dist=12+rnd()*45;
  const angle=rnd()*Math.PI*2;
  HUMANS.push({
    anchorId:anchor.id, ox:Math.cos(angle)*dist, oy:Math.sin(angle)*dist,
    r:0.6+rnd()*0.7, baseAlpha:0.5+rnd()*0.4,
    phase:rnd()*Math.PI*2, speed:1.2+rnd()*1.1,
  });
}

/* ── RENDER ── */
function render(ts){
  requestAnimationFrame(render);
  ctx.clearRect(0,0,W,H);

  /* FRQNCY field */
  const breathe=0.5+0.5*Math.sin(ts*0.00032);
  const breathe2=0.5+0.5*Math.sin(ts*0.00025+0.8);

  const field=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*0.52);
  field.addColorStop(0,`rgba(196,151,58,${0.05+0.03*breathe})`);
  field.addColorStop(0.25,`rgba(74,122,232,${0.03+0.015*breathe2})`);
  field.addColorStop(0.6,`rgba(11,28,61,0.04)`);
  field.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=field; ctx.fillRect(0,0,W,H);

  // Rotating sacred geometry rings
  ctx.save();
  ctx.translate(cx,cy);
  const ringAlpha=0.04+0.02*breathe;
  [0.155,0.335,0.49].forEach((rf,ri)=>{
    const r=Math.min(W,H)*rf;
    ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(196,151,58,${ringAlpha*(1-ri*0.25)})`;
    ctx.lineWidth=0.5; ctx.stroke();
  });

  // Rotating outer dotted ring
  ctx.rotate(ts*0.000012);
  const outerR=Math.min(W,H)*0.52;
  const nDots=60;
  for(let i=0;i<nDots;i++){
    const a=(i/nDots)*Math.PI*2;
    const dx=Math.cos(a)*outerR, dy=Math.sin(a)*outerR;
    ctx.beginPath(); ctx.arc(dx,dy,1,0,Math.PI*2);
    ctx.fillStyle=`rgba(196,151,58,${0.12+0.06*Math.sin(ts*0.001+i*0.4)})`;
    ctx.fill();
  }
  ctx.restore();

  // Faint FRQNCY text
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(ts*0.000014);
  ctx.font=`300 ${Math.min(W,H)*0.19}px 'Cormorant',Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(196,151,58,${0.025+0.01*breathe})`;
  ctx.fillText('FRQNCY',0,0);
  ctx.restore();

  /* Background stars */
  const t2=ts*0.0006;
  for(let i=0;i<STARS.length;i++){
    const s=STARS[i];
    const a=s.base*(0.6+0.4*Math.sin(t2+s.phase));
    ctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(((s.x+panX)*scale+cx*(1-scale))%W,((s.y+panY)*scale+cy*(1-scale))%H,s.r,0,Math.PI*2); ctx.fill();
  }

  /* Apply pan/zoom */
  ctx.save();
  ctx.translate(cx+panX,cy+panY);
  ctx.scale(scale,scale);
  ctx.translate(-cx,-cy);

  /* Connection lines */
  // Pillar ring connections
  ctx.setLineDash([]);
  PILLARS.forEach((p,i)=>{
    const a=nodeMap[p.id]; const b=nodeMap[PILLARS[(i+1)%PILLARS.length].id];
    if(!a||!b) return;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y);
    ctx.strokeStyle='rgba(196,151,58,0.15)'; ctx.lineWidth=0.8; ctx.stroke();
  });

  // Spoke lines from center to pillars
  PILLARS.forEach(p=>{
    const n=nodeMap[p.id]; if(!n) return;
    const isHov=hovered&&(hovered.id===p.id||(hovered.pillarId===p.id)||(hovered.domain&&nodeMap[hovered.domain]?.pillarId===p.id));
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(n.x,n.y);
    ctx.strokeStyle=`rgba(196,151,58,${isHov?0.25:0.08})`;
    ctx.lineWidth=0.6; ctx.stroke();
  });

  // Pillar-to-domain spokes
  DOMAINS.forEach(d=>{
    const dn=nodeMap[d.id]; const pn=nodeMap[d.pillar]; if(!dn||!pn) return;
    const isHov=hovered&&(hovered.id===d.id||hovered.id===d.pillar||hovered.domain===d.id);
    ctx.beginPath(); ctx.moveTo(pn.x,pn.y); ctx.lineTo(dn.x,dn.y);
    ctx.strokeStyle=`rgba(74,122,232,${isHov?0.35:0.12})`;
    ctx.lineWidth=0.5; ctx.stroke();
  });

  // Domain-to-topic spokes
  TOPICS.forEach(t=>{
    const tn=nodeMap[t.id]; const dn=nodeMap[t.domain]; if(!tn||!dn) return;
    const isHov=hovered&&(hovered.id===t.id||hovered.id===t.domain);
    ctx.beginPath(); ctx.moveTo(dn.x,dn.y); ctx.lineTo(tn.x,tn.y);
    ctx.strokeStyle=`rgba(41,82,179,${isHov?0.3:0.07})`;
    ctx.lineWidth=0.35; ctx.stroke();
  });

  /* FRQNCY center glow */
  const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,38);
  cg.addColorStop(0,`rgba(196,151,58,${0.4+0.2*breathe})`);
  cg.addColorStop(0.4,`rgba(196,151,58,${0.12+0.06*breathe})`);
  cg.addColorStop(1,'rgba(196,151,58,0)');
  ctx.fillStyle=cg; ctx.beginPath(); ctx.arc(cx,cy,38,0,Math.PI*2); ctx.fill();

  // Center point
  ctx.beginPath(); ctx.arc(cx,cy,5,0,Math.PI*2);
  ctx.fillStyle=`rgba(232,201,125,${0.9+0.1*breathe})`;
  ctx.fill();

  // Center FRQNCY label
  ctx.font=`300 11px 'Cormorant',Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.fillStyle=`rgba(196,151,58,0.55)`;
  ctx.letterSpacing='0.3em';
  ctx.fillText('FRQNCY',cx,cy+10);

  /* PILLAR NODES */
  PILLARS.forEach(p=>{
    const n=nodeMap[p.id]; if(!n) return;
    const isHov=hovered&&(hovered.id===p.id);
    const glow=ctx.createRadialGradient(n.x,n.y,n.r*0.4,n.x,n.y,n.r*2.2);
    glow.addColorStop(0,`rgba(90,138,255,${isHov?0.3:0.12})`);
    glow.addColorStop(1,'rgba(90,138,255,0)');
    ctx.fillStyle=glow; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*2.2,0,Math.PI*2); ctx.fill();

    const grad=ctx.createRadialGradient(n.x-n.r*0.3,n.y-n.r*0.3,0,n.x,n.y,n.r);
    grad.addColorStop(0,'#5A8AFF'); grad.addColorStop(1,'#0D1E52');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=isHov?'#7aaaff':'#4A7AE8'; ctx.lineWidth=isHov?1.5:1;
    ctx.stroke();

    ctx.font=`300 10.5px 'Cormorant',Georgia,serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='#FFFFFF';
    ctx.fillText(n.label,n.x,n.y);
  });

  /* DOMAIN NODES */
  DOMAINS.forEach(d=>{
    const n=nodeMap[d.id]; if(!n) return;
    const isHov=hovered&&(hovered.id===d.id);
    const grad=ctx.createRadialGradient(n.x-n.r*0.3,n.y-n.r*0.3,0,n.x,n.y,n.r);
    grad.addColorStop(0,'#3062C8'); grad.addColorStop(1,'#060E28');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=isHov?'#5A8AFF':'#2952B3'; ctx.lineWidth=isHov?1.2:0.8; ctx.stroke();

    ctx.font=`300 8.5px 'Jost',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(232,201,125,0.9)';
    const words=n.label.split(' ');
    if(words.length>2){
      const half=Math.ceil(words.length/2);
      ctx.fillText(words.slice(0,half).join(' '),n.x,n.y-5);
      ctx.fillText(words.slice(half).join(' '),n.x,n.y+5);
    } else { ctx.fillText(n.label,n.x,n.y); }
  });

  /* TOPIC NODES */
  TOPICS.forEach(t=>{
    const n=nodeMap[t.id]; if(!n) return;
    const isHov=hovered&&(hovered.id===t.id);
    const grad=ctx.createRadialGradient(n.x-n.r*0.3,n.y-n.r*0.3,0,n.x,n.y,n.r);
    grad.addColorStop(0,'#213E88'); grad.addColorStop(1,'#040A1A');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=isHov?'#3062C8':'#1A3068'; ctx.lineWidth=isHov?1:0.6; ctx.stroke();

    if(isHov){
      ctx.font=`300 7.5px 'Jost',sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='rgba(172,202,255,0.95)';
      ctx.fillText(n.label,n.x,n.y);
    }
  });

  /* HUMAN STARS */
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i];
    const a=nodeMap[h.anchorId]; if(!a) continue;
    const hx=a.x+h.ox, hy=a.y+h.oy;
    const twinkle=0.55+0.45*Math.sin(ts*0.001*h.speed+h.phase);
    const alpha=h.baseAlpha*twinkle;
    ctx.fillStyle=`rgba(220,235,255,${(alpha*0.22).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r*3,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

window.addEventListener('resize',resize);
resize();
requestAnimationFrame(render);
</script>
</body>
</html>
