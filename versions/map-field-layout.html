    #ui-sub {

      z-index:5; text-align:center; pointer-events:none;
      font-family:var(--font-display); font-size:clamp(11px,1.1vw,14px);
      font-style:italic; font-weight:300;
      color:rgba(196,151,58,0.28); letter-spacing:0.18em; white-space:nowrap;
    }
    #back-btn {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%); z-index:5;
      background:transparent; border:1px solid rgba(196,151,58,0.22); color:rgba(196,151,58,0.45);

  ["t-futurecity","t-archit"],["t-futurecity","t-systems"],
  ["t-source","t-efields"],["t-source","t-vibration"],
  ["t-oneness","t-collective"],["t-oneness","t-source"],
  ["t-soul","t-sync"],["t-soul","t-source"],
  ["t-edusystem","t-collective"],["t-opensource","t-decentral"],
  ["t-diaspora","t-socialmov"],["t-diaspora","t-community"],
  ["t-detox","t-minimalism"],["t-dance","t-movement"],
  ["t-efields","t-energyheal"],["t-efields","t-vibration"],
  ["t-archit","t-sacredgeo"],["t-story","t-film"],["t-poetry","t-story"],
  ["t-regenfarm","t-ecology"],["t-permaculture","t-ecology"],["t-permaculture","t-sustliving"],
  ["t-foodsystems","t-circular"],["t-foodsov","t-indigenous"],["t-urbanfarm","t-futurecity"],
  ["t-cuisine","t-community"],["t-renewable","t-climate"],["t-solar","t-renewable"],
  ["t-wind","t-renewable"],["t-bioenergy","t-renewable"],["t-energypolicy","t-governance"],
  ["t-gridtech","t-systems"],["t-storage","t-gridtech"],
  ["t-language","t-story"],["t-journalism","t-socialmov"],["t-nvc","t-peace"],
  ["t-socialmedia","t-collective"],["t-dialogue","t-peace"],["t-broadcasting","t-journalism"],
  ["t-sports","t-movement"],["t-festivals","t-community"],["t-gaming","t-ai"],
  ["t-esports","t-gaming"],["t-playcreat","t-cocreate"],["t-outdoor","t-ecology"],
  ["t-leisure","t-mentalhlth"],["t-humor","t-story"],
];
const LINKS=RAW.map(([s,t])=>({source:s,target:t}));

const visibleNodes = NODES.filter(n=>!n.hidden);
document.getElementById('node-count').textContent=`${visibleNodes.length} nodes · 1000 humans`;

/* ── CANVAS ── */
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');
function resizeCanvas(){ canvas.width=innerWidth; canvas.height=innerHeight; }
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

const STARS=[];
for(let i=0;i<140;i++) STARS.push({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:Math.random()*1.2+0.15, base:Math.random()*0.4+0.06, phase:Math.random()*Math.PI*2
});

/* ── SVG / D3 ── */
const W=innerWidth, H=innerHeight;
const svg=d3.select('#map-svg');
const defs=d3.select('#svg-defs');

[
  {id:'g-main',    c1:'#5A8AFF',c2:'#122878'},
  {id:'g-cluster', c1:'#3062C8',c2:'#081640'},
  {id:'g-topic',   c1:'#213E88',c2:'#060E24'},
].forEach(g=>{
  const gr=defs.append('radialGradient').attr('id',g.id).attr('cx','38%').attr('cy','30%');
  gr.append('stop').attr('offset','0%').attr('stop-color',g.c1);
  gr.append('stop').attr('offset','100%').attr('stop-color',g.c2);
});

let zoomState={x:0,y:0,k:1};
const zoomG=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.08,4]).on('zoom',e=>{
  zoomG.attr('transform',e.transform);
  zoomState=e.transform;
}));

/* Simulation — frqncy node kept at center invisibly as anchor */
const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(LINKS).id(d=>d.id)
    .distance(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return 240;
      if(s==='main'&&t==='main') return 190;
      if(s==='main'||t==='main') return 200;
      if(s==='cluster'||t==='cluster') return (t==='topic'||s==='topic')?118:155;
      return 88;
    })
    .strength(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return 0.08;
      if(s==='main'&&t==='main') return 0.35;
      if(s==='main'||t==='main') return 0.38;
      return 0.32;
    })
  )
  .force('charge',d3.forceManyBody().strength(d=>{
    if(d.hidden) return 0;
    switch(d.type){
      case 'main': return -900; case 'cluster': return -420; default: return -140;
    }
  }).theta(0.9))
  .force('radial',d3.forceRadial(d=>{
    if(d.hidden) return 0;
    if(d.type==='main') return 230;
    if(d.type==='cluster') return 420;
    return 590;
  },W/2,H/2).strength(d=>d.hidden?1:0.18))
  .force('center',d3.forceCenter(W/2,H/2).strength(0.01))
  .force('collide',d3.forceCollide(d=>d.hidden?0:d.r+9).strength(0.55).iterations(1))
  .alphaDecay(0.025).velocityDecay(0.42);

/* Fix frqncy at center */
const frqncyNode=NODES.find(n=>n.id==='frqncy');
frqncyNode.fx=W/2; frqncyNode.fy=H/2;

const nodeById={};
NODES.forEach(n=>{ nodeById[n.id]=n; });

/* ── 1000 HUMAN STARS ── */
const topicPool=NODES.filter(n=>n.type==='topic'||n.type==='cluster');
function srand(seed){ let x=seed; return ()=>{ x=((x^(x<<13))^(x>>7)^(x<<17))>>>0; return (x%100000)/100000; }; }
const HUMANS=[];
for(let i=0;i<1000;i++){
  const rnd=srand(i*31337+i*i+1);
  const anchor=topicPool[Math.floor(rnd()*topicPool.length)];
  const dist=anchor.r+8+rnd()*55;
  const angle=rnd()*Math.PI*2;
  HUMANS.push({
    anchorId:anchor.id, ox:Math.cos(angle)*dist, oy:Math.sin(angle)*dist,
    r:0.7+rnd()*0.8, baseAlpha:0.55+rnd()*0.40,
    phase:rnd()*Math.PI*2, speed:1.4+rnd()*1.2,
    lineAlpha:0.04+rnd()*0.06, showLine:rnd()<0.45,
  });
}

/* ── SVG NODES (skip hidden frqncy) ── */
const nodeG=zoomG.append('g');
const nodeSel=nodeG.selectAll('g.node')
  .data(NODES.filter(n=>!n.hidden))
  .join('g').attr('class','node').style('cursor','pointer');

nodeSel.append('circle')
  .attr('r',d=>d.r)
  .attr('fill',d=>d.type==='cluster'?'url(#g-cluster)':d.type==='topic'?'url(#g-topic)':'url(#g-main)')
  .attr('stroke',d=>d.type==='main'?'#4A7AE8':d.type==='cluster'?'#2952B3':'#1A3A8F')
  .attr('stroke-width',1);

nodeSel.append('text')
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill',d=>d.type==='main'?'#FFFFFF':d.type==='cluster'?'#E8C97D':'rgba(172,202,255,0.88)')
  .attr('font-family',d=>d.type==='main'?'Cormorant,Georgia,serif':"'Jost',sans-serif")
  .attr('font-size',d=>d.type==='main'?'11px':d.type==='cluster'?'9.5px':'8px')
  .attr('font-weight',d=>d.type==='main'?'400':'300')
  .attr('letter-spacing',d=>d.type==='main'?'0.12em':'0.04em')
  .attr('pointer-events','none')
  .each(function(d){
    const el=d3.select(this);
    if((d.type==='topic'||d.type==='cluster')&&d.label.length>14){
      const w=d.label.split(' '),m=Math.ceil(w.length/2);
      el.append('tspan').attr('x',0).attr('dy','-0.5em').text(w.slice(0,m).join(' '));
      el.append('tspan').attr('x',0).attr('dy','1em').text(w.slice(m).join(' '));
    } else { el.text(d.label); }
  });

nodeSel.call(d3.drag()
  .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
  .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
);

sim.on('tick',()=>{
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

/* ── HOVER ── */
const tip=document.getElementById('tooltip');
let hoveredNodeIds=null;
nodeSel
  .on('mouseover',(e,d)=>{
    const conn=new Set([d.id]);
    LINKS.forEach(l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      if(s===d.id) conn.add(t); if(t===d.id) conn.add(s);
    });
    hoveredNodeIds=conn;
    nodeSel.style('opacity',n=>conn.has(n.id)?1:0.05);
    tip.querySelector('.tip-title').textContent=d.label;
    tip.querySelector('.tip-type').textContent=(d.desc||'')+' · '+({main:'PILLAR',cluster:'DOMAIN',topic:'TOPIC'}[d.type]||'');
    tip.style.opacity=1;
  })
  .on('mousemove',e=>{ tip.style.left=(e.clientX+18)+'px'; tip.style.top=(e.clientY-14)+'px'; })
  .on('mouseout',()=>{ tip.style.opacity=0; hoveredNodeIds=null; nodeSel.style('opacity',1); });

/* ── RENDER LOOP ── */
const particles=[];
let lastMajor=0, lastDotPulse=0;

function spawnParticle(fromDot){
  if(fromDot){
    const h=HUMANS[Math.floor(Math.random()*HUMANS.length)];
    const a=nodeById[h.anchorId]; if(!a||a.x===undefined) return;
    const hx=a.x+h.ox, hy=a.y+h.oy, fwd=Math.random()>0.4;
    particles.push({x1:fwd?hx:a.x,y1:fwd?hy:a.y,x2:fwd?a.x:hx,y2:fwd?a.y:hy,prog:0,speed:0.013+Math.random()*0.01,isDot:true});
  } else {
    // Travel along any link (not just from center)
    const visLinks=LINKS.filter(l=>{
      const s=typeof l.source==='object'?l.source:nodeById[l.source];
      return s&&!s.hidden&&s.x!==undefined;
    });
    const l=visLinks[Math.floor(Math.random()*visLinks.length)];
    const s=typeof l.source==='object'?l.source:nodeById[l.source];
    const t=typeof l.target==='object'?l.target:nodeById[l.target];
    if(!s||!t||s.x===undefined||t.x===undefined) return;
    particles.push({x1:s.x,y1:s.y,x2:t.x,y2:t.y,prog:0,speed:0.007+Math.random()*0.005,isDot:false});
  }
}

function render(ts){
  requestAnimationFrame(render);
  const CW=canvas.width, CH=canvas.height;
  ctx.clearRect(0,0,CW,CH);

  /* ── THE FRQNCY FIELD — ambient breathing presence ── */
  const breathe=0.5+0.5*Math.sin(ts*0.00035);
  const breathe2=0.5+0.5*Math.sin(ts*0.00028+1.2);

  // Outer dark field
  const outerField=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.max(CW,CH)*0.8);
  outerField.addColorStop(0,`rgba(13,22,58,${0.35+0.1*breathe2})`);
  outerField.addColorStop(0.5,`rgba(8,15,40,0.2)`);
  outerField.addColorStop(1,'rgba(4,8,22,0)');
  ctx.fillStyle=outerField; ctx.fillRect(0,0,CW,CH);

  // Inner gold pulse — FRQNCY is at the heart of everything
  const innerField=ctx.createRadialGradient(CW/2,CH/2,0,CW/2,CH/2,Math.min(CW,CH)*0.42);
  innerField.addColorStop(0,`rgba(196,151,58,${0.055+0.035*breathe})`);
  innerField.addColorStop(0.3,`rgba(120,90,30,${0.03+0.015*breathe})`);
  innerField.addColorStop(0.7,`rgba(74,122,232,${0.02+0.01*breathe2})`);
  innerField.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=innerField; ctx.fillRect(0,0,CW,CH);

  /* ── FRQNCY ambient text — everywhere and nowhere ── */
  ctx.save();
  ctx.translate(CW/2,CH/2);
  ctx.rotate(ts*0.000018);
  ctx.font=`300 ${Math.min(CW,CH)*0.22}px 'Cormorant',Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.letterSpacing='0.6em';
  ctx.fillStyle=`rgba(196,151,58,${0.028+0.012*breathe})`;
  ctx.fillText('FRQNCY',0,0);
  ctx.restore();

  // Secondary text at different angle & size
  ctx.save();
  ctx.translate(CW/2,CH/2);
  ctx.rotate(-ts*0.000009+Math.PI*0.5);
  ctx.font=`300 ${Math.min(CW,CH)*0.08}px 'Cormorant',Georgia,serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillStyle=`rgba(196,151,58,${0.018+0.008*breathe2})`;
  ctx.fillText('FRQNCY',0,0);
  ctx.restore();

  /* ── BACKGROUND STARS ── */
  const t=ts*0.0007;
  for(let i=0;i<STARS.length;i++){
    const s=STARS[i];
    const a=s.base*(0.65+0.35*Math.sin(t+s.phase));
    ctx.fillStyle=`rgba(255,255,255,${a.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  }

  /* ── PARTICLES ── */
  if(ts-lastMajor>280){ spawnParticle(false); lastMajor=ts; }
  if(ts-lastDotPulse>90){ spawnParticle(true); lastDotPulse=ts; }

  /* ── ZOOM TRANSFORM ── */
  const {x:zx,y:zy,k:zk}=zoomState;
  ctx.save();
  ctx.translate(zx,zy); ctx.scale(zk,zk);

  /* ── LINKS ── */
  ctx.setLineDash([]);

  // Pillar-to-pillar links — gold (FRQNCY is the connection)
  ctx.strokeStyle='rgba(196,151,58,0.38)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  LINKS.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined||t_.x===undefined) return;
    const st=typeof s==='object'?s.type:null;
    const tt=typeof t_==='object'?t_.type:null;
    if(st!=='main'||tt!=='main') return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  // Frqncy-to-pillar ghost links — very faint gold
  ctx.strokeStyle='rgba(196,151,58,0.08)'; ctx.lineWidth=0.8;
  ctx.setLineDash([4,10]);
  ctx.beginPath();
  LINKS.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined||t_.x===undefined) return;
    const sh=typeof s==='object'?s.hidden:false;
    const th=typeof t_==='object'?t_.hidden:false;
    if(!sh&&!th) return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();
  ctx.setLineDash([]);

  // Pillar-to-domain links
  ctx.strokeStyle='rgba(74,122,232,0.22)'; ctx.lineWidth=1.0;
  ctx.beginPath();
  LINKS.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined||t_.x===undefined) return;
    if(s.hidden||t_.hidden) return;
    const st=typeof s==='object'?s.type:null;
    const tt=typeof t_==='object'?t_.type:null;
    if(!((st==='main'&&tt==='cluster')||(st==='cluster'&&tt==='main'))) return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  // Domain-to-topic + cross-topic links
  ctx.strokeStyle='rgba(41,82,179,0.12)'; ctx.lineWidth=0.5;
  ctx.beginPath();
  LINKS.forEach(l=>{
    const s=l.source,t_=l.target;
    if(!s||!t_||s.x===undefined||t_.x===undefined) return;
    if(s.hidden||t_.hidden) return;
    const st=typeof s==='object'?s.type:null;
    const tt=typeof t_==='object'?t_.type:null;
    if(st==='main'||tt==='main') return;
    if(hoveredNodeIds&&!hoveredNodeIds.has(s.id)&&!hoveredNodeIds.has(t_.id)) return;
    ctx.moveTo(s.x,s.y); ctx.lineTo(t_.x,t_.y);
  });
  ctx.stroke();

  /* ── NODE GLOWS ── */
  NODES.forEach(n=>{
    if(!n.x||n.hidden) return;
    if(n.type==='main'){
      const g=ctx.createRadialGradient(n.x,n.y,n.r*0.5,n.x,n.y,n.r*2.2);
      g.addColorStop(0,'rgba(74,122,232,0.18)'); g.addColorStop(1,'rgba(74,122,232,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*2.2,0,Math.PI*2); ctx.fill();
    }
  });

  /* ── 1000 HUMAN STARS ── */
  const lineGroups=[{a:0.10,lines:[]},{a:0.07,lines:[]},{a:0.04,lines:[]}];
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i]; if(!h.showLine) continue;
    const a=nodeById[h.anchorId]; if(!a||a.x===undefined) continue;
    if(hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId)) continue;
    const hx=a.x+h.ox,hy=a.y+h.oy;
    const g=h.lineAlpha>0.08?lineGroups[0]:h.lineAlpha>0.055?lineGroups[1]:lineGroups[2];
    g.lines.push(hx,hy,a.x,a.y);
  }
  ctx.lineWidth=0.4;
  lineGroups.forEach(g=>{ if(!g.lines.length) return; ctx.strokeStyle=`rgba(190,215,255,${g.a})`; ctx.beginPath(); for(let j=0;j<g.lines.length;j+=4){ ctx.moveTo(g.lines[j],g.lines[j+1]); ctx.lineTo(g.lines[j+2],g.lines[j+3]); } ctx.stroke(); });

  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i]; const a=nodeById[h.anchorId]; if(!a||a.x===undefined) continue;
    const hx=a.x+h.ox,hy=a.y+h.oy;
    const twinkle=0.55+0.45*Math.sin(ts*0.001*h.speed+h.phase);
    const dimmed=hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId);
    const alpha=dimmed?0.02:h.baseAlpha*twinkle;
    ctx.fillStyle=`rgba(220,235,255,${(alpha*0.25).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r*3.5,0,Math.PI*2); ctx.fill();
  }
  for(let i=0;i<HUMANS.length;i++){
    const h=HUMANS[i]; const a=nodeById[h.anchorId]; if(!a||a.x===undefined) continue;
    const hx=a.x+h.ox,hy=a.y+h.oy;
    const twinkle=0.55+0.45*Math.sin(ts*0.001*h.speed+h.phase);
    const dimmed=hoveredNodeIds&&!hoveredNodeIds.has(h.anchorId);
    const alpha=dimmed?0.04:h.baseAlpha*twinkle;
    ctx.fillStyle=`rgba(255,255,255,${alpha.toFixed(2)})`;
    ctx.beginPath(); ctx.arc(hx,hy,h.r,0,Math.PI*2); ctx.fill();
  }

  /* ── PARTICLES ── */
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.prog+=p.speed;
    if(p.prog>=1){ particles.splice(i,1); continue; }
    const px=p.x1+(p.x2-p.x1)*p.prog,py=p.y1+(p.y2-p.y1)*p.prog;
    const fade=Math.min(p.prog*5,1)*Math.min((1-p.prog)*5,1);
    ctx.fillStyle=p.isDot
      ?`rgba(210,230,255,${(0.7*fade).toFixed(2)})`
      :`rgba(196,151,58,${(0.85*fade).toFixed(2)})`;
    ctx.beginPath(); ctx.arc(px,py,p.isDot?1.0:1.8,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}
requestAnimationFrame(render);
</script>
</body>
</html>
