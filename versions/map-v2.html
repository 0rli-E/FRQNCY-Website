/* ── Twinkling stars ── */
(function(){
  const c=document.getElementById('stars-canvas');
  const ctx=c.getContext('2d');
  let stars=[];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  function init(){
    stars=[];
    for(let i=0;i<340;i++) stars.push({
      x:Math.random()*c.width, y:Math.random()*c.height,
      r:Math.random()*1.5+0.2, a:Math.random()*0.6+0.1, phase:Math.random()*Math.PI*2
    });
  }
  let t=0;
  function draw(){
    ctx.clearRect(0,0,c.width,c.height); t+=0.007;
    stars.forEach(s=>{
      const a=s.a*(0.65+0.35*Math.sin(t+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',()=>{ resize(); init(); });
  resize(); init(); draw();
})();

  ["t-diaspora","t-socialmov"],["t-diaspora","t-community"],
  ["t-detox","t-minimalism"],["t-dance","t-movement"],
  ["t-efields","t-energyheal"],["t-efields","t-vibration"],
  ["t-archit","t-sacredgeo"],["t-story","t-film"],["t-poetry","t-story"],
];

const LINKS = RAW.map(([s,t])=>({source:s,target:t,isDot:false}));

// Seeded random for reproducible dot connections
function seededRand(seed){
  let x=seed*9301+49297;
  return ()=>{ x=(x*9301+49297)%233280; return x/233280; };
}

const topicIds = NODES.filter(n=>n.type==="topic").map(n=>n.id);
const dotConnections = {};
NODES.filter(n=>n.type==="dot").forEach((dot,i)=>{
  const rnd=seededRand(i*37+13);
  const count=2+Math.floor(rnd()*3);
  const pool=[...topicIds].sort(()=>rnd()-0.5);
  dotConnections[dot.id]=[];
  for(let j=0;j<count;j++){
    LINKS.push({source:dot.id,target:pool[j],isDot:true});
    dotConnections[dot.id].push(pool[j]);
  }
});

document.getElementById('node-count').textContent=
  `${NODES.length} nodes · ${LINKS.length} connections`;

/* ──────────── D3 ──────────── */
const W=innerWidth, H=innerHeight;
const svg=d3.select('#map-svg');
const defs=svg.append('defs');

// Gradients
[
  {id:'grad-core',    c1:'#F4DC88',c2:'#A06818'},
  {id:'grad-main',    c1:'#5A8AFF',c2:'#122878'},
  {id:'grad-cluster', c1:'#3062C8',c2:'#081640'},
  {id:'grad-topic',   c1:'#213E88',c2:'#060E24'},
].forEach(g=>{
  const gr=defs.append('radialGradient').attr('id',g.id).attr('cx','38%').attr('cy','30%');
  gr.append('stop').attr('offset','0%').attr('stop-color',g.c1);
  gr.append('stop').attr('offset','100%').attr('stop-color',g.c2);
});
// Human dot gradient — clean white
const hg=defs.append('radialGradient').attr('id','grad-dot').attr('cx','35%').attr('cy','28%');
hg.append('stop').attr('offset','0%').attr('stop-color','#FFFFFF').attr('stop-opacity','0.97');
hg.append('stop').attr('offset','100%').attr('stop-color','#C8DCFF').attr('stop-opacity','0.6');

// Glow filters
[
  {id:'glow-gold',  dev:12,x:'-70%',w:'240%'},
  {id:'glow-blue',  dev:14,x:'-70%',w:'240%'},
  {id:'glow-clust', dev:8, x:'-60%',w:'220%'},
  {id:'glow-soft',  dev:5, x:'-50%',w:'200%'},
  {id:'glow-human', dev:7, x:'-70%',w:'240%'},
].forEach(g=>{
  const f=defs.append('filter').attr('id',g.id)
    .attr('x',g.x).attr('y',g.x).attr('width',g.w).attr('height',g.w);
  f.append('feGaussianBlur').attr('stdDeviation',g.dev).attr('result','blur');
  const m=f.append('feMerge');
  m.append('feMergeNode').attr('in','blur');
  m.append('feMergeNode').attr('in','SourceGraphic');
});

/* Zoom */
const zoomG=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.1,4]).on('zoom',e=>zoomG.attr('transform',e.transform)));

/* Simulation */
const sim=d3.forceSimulation(NODES)
  .force('link',d3.forceLink(LINKS).id(d=>d.id)
    .distance(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return (t==='main'||s==='main')?210:258;
      if(s==='main'||t==='main') return 178;
      if(s==='cluster'||t==='cluster') return (t==='topic'||s==='topic')?112:148;
      if(s==='dot'||t==='dot') return 98;
      return 84;
    })
    .strength(d=>{
      const s=d.source.type||'topic',t=d.target.type||'topic';
      if(s==='core'||t==='core') return 0.55;
      if(s==='dot'||t==='dot') return 0.22;
      return 0.38;
    })
  )
  .force('charge',d3.forceManyBody().strength(d=>{
    switch(d.type){
      case 'core': return -1600; case 'main': return -750;
      case 'cluster': return -400; case 'topic': return -130; case 'dot': return -18;
    }
  }))
  .force('center',d3.forceCenter(W/2,H/2).strength(0.04))
  .force('collide',d3.forceCollide(d=>d.r+8).strength(0.7))
  .alphaDecay(0.022).velocityDecay(0.4);

/* Link groups */
const linkG=zoomG.append('g');

// Regular links
const regLinks=linkG.selectAll('line.rl').data(LINKS.filter(l=>!l.isDot)).join('line').attr('class','rl')
  .attr('stroke',d=>{
    const s=typeof d.source==='object'?d.source.type:'x';
    const t=typeof d.target==='object'?d.target.type:'x';
    if(s==='core'||t==='core') return 'rgba(196,151,58,0.48)';
    if(s==='main'||t==='main') return 'rgba(74,122,232,0.28)';
    return 'rgba(41,82,179,0.16)';
  })
  .attr('stroke-width',d=>{
    const s=typeof d.source==='object'?d.source.type:'x';
    if(s==='core') return 1.8; if(s==='main') return 1.2; return 0.65;
  });

// Human-passion links (dashed, animated via CSS)
const dotLinks=zoomG.append('g').selectAll('line.human-link')
  .data(LINKS.filter(l=>l.isDot)).join('line')
  .attr('class','human-link')
  .attr('stroke','rgba(210,228,255,0.35)')
  .attr('stroke-width',0.85);

/* Nodes */
const nodeG=zoomG.append('g');
const nodeSel=nodeG.selectAll('g.node').data(NODES).join('g').attr('class','node').style('cursor','pointer');

// Glow rings — core/main/cluster
nodeSel.filter(d=>d.type==='core'||d.type==='main'||d.type==='cluster')
  .append('circle')
  .attr('r',d=>d.r+(d.type==='core'?24:d.type==='main'?15:10))
  .attr('fill','none')
  .attr('filter',d=>d.type==='core'?'url(#glow-gold)':d.type==='main'?'url(#glow-blue)':'url(#glow-clust)')
  .attr('stroke',d=>d.type==='core'?'rgba(196,151,58,0.22)':d.type==='main'?'rgba(74,122,232,0.15)':'rgba(41,82,179,0.08)')
  .attr('stroke-width',d=>d.type==='core'?2:1);

// Topic soft glow
nodeSel.filter(d=>d.type==='topic')
  .append('circle').attr('r',d=>d.r+5)
  .attr('fill','none').attr('filter','url(#glow-soft)')
  .attr('stroke','rgba(41,82,179,0.07)').attr('stroke-width',0.5);

// Human glow ring (CSS animated)
nodeSel.filter(d=>d.type==='dot')
  .append('circle').attr('r',d=>d.r+9)
  .attr('fill','none').attr('class','human-glow')
  .attr('filter','url(#glow-human)')
  .attr('stroke','rgba(200,218,255,0.2)').attr('stroke-width',0.8);

// Main body
nodeSel.append('circle')
  .attr('r',d=>d.r)
  .attr('fill',d=>d.type==='dot'?'url(#grad-dot)':d.type==='cluster'?'url(#grad-cluster)':d.type==='topic'?'url(#grad-topic)':`url(#grad-${d.type})`)
  .attr('stroke',d=>{
    if(d.type==='dot')     return 'rgba(255,255,255,0.5)';
    if(d.type==='core')    return '#E0C06A';
    if(d.type==='main')    return '#4A7AE8';
    if(d.type==='cluster') return '#2952B3';
    return '#1A3A8F';
  })
  .attr('stroke-width',d=>d.type==='core'?2.5:d.type==='dot'?0.6:1)
  .attr('class',d=>d.type==='dot'?`hd-${d.dotIndex}`:'');

// Labels
nodeSel.filter(d=>d.type!=='dot').append('text')
  .attr('text-anchor','middle').attr('dominant-baseline','central')
  .attr('fill',d=>d.type==='core'?'#0A1220':d.type==='main'?'#FFFFFF':d.type==='cluster'?'#E8C97D':'rgba(172,202,255,0.88)')
  .attr('font-family',d=>(d.type==='core'||d.type==='main')?'Cormorant,Georgia,serif':"'Jost',sans-serif")
  .attr('font-size',d=>d.type==='core'?'15px':d.type==='main'?'10.5px':d.type==='cluster'?'9.5px':'8px')
  .attr('font-weight',d=>d.type==='core'?'500':'300')
  .attr('letter-spacing',d=>d.type==='core'?'0.18em':'0.04em')
  .attr('pointer-events','none')
  .each(function(d){
    const el=d3.select(this);
    if(d.type==='topic'&&d.label.length>14){
      const words=d.label.split(' '), mid=Math.ceil(words.length/2);
      el.append('tspan').attr('x',0).attr('dy','-0.5em').text(words.slice(0,mid).join(' '));
      el.append('tspan').attr('x',0).attr('dy','1em').text(words.slice(mid).join(' '));
    } else { el.text(d.label); }
  });

/* Drag */
nodeSel.call(d3.drag()
  .on('start',(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
  .on('drag', (e,d)=>{ d.fx=e.x; d.fy=e.y; })
  .on('end',  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
);

/* Tooltip + hover dimming */
const tip=document.getElementById('tooltip');
nodeSel
  .on('mouseover',(e,d)=>{
    if(d.type==='dot'){
      const conn=new Set([d.id,...(dotConnections[d.id]||[])]);
      nodeSel.style('opacity',n=>conn.has(n.id)?1:0.05);
      dotLinks.style('opacity',l=>{
        const s=typeof l.source==='object'?l.source.id:l.source;
        return s===d.id?1:0.02;
      });
      regLinks.style('opacity',0.03);
      return;
    }
    tip.querySelector('.tip-title').textContent=d.label;
    tip.querySelector('.tip-type').textContent=(d.desc||'')+(d.desc?' · ':'')+({core:'FRQNCY CORE',main:'PILLAR',cluster:'DOMAIN',topic:'TOPIC'}[d.type]||'');
    tip.style.opacity=1;
    const conn=new Set([d.id]);
    LINKS.forEach(l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      if(s===d.id) conn.add(t); if(t===d.id) conn.add(s);
    });
    nodeSel.style('opacity',n=>conn.has(n.id)?1:0.05);
    regLinks.style('opacity',l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return (s===d.id||t===d.id)?0.9:0.03;
    });
    dotLinks.style('opacity',l=>{
      const t=typeof l.target==='object'?l.target.id:l.target;
      return conn.has(t)?0.55:0.02;
    });
  })
  .on('mousemove',e=>{ tip.style.left=(e.clientX+18)+'px'; tip.style.top=(e.clientY-14)+'px'; })
  .on('mouseout',()=>{ tip.style.opacity=0; nodeSel.style('opacity',1); regLinks.style('opacity',1); dotLinks.style('opacity',1); });

/* Tick */
sim.on('tick',()=>{
  regLinks.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  dotLinks.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
  nodeSel.attr('transform',d=>`translate(${d.x},${d.y})`);
});

/* Signal pulses — gold on main links */
const majorLinks=LINKS.filter(l=>{ const s=typeof l.source==='object'?l.source.type:'x'; return s==='core'||s==='main'; });
function pulse(){
  if(!majorLinks.length) return;
  const l=majorLinks[Math.floor(Math.random()*majorLinks.length)];
  const s=l.source,t=l.target;
  if(!s||!t||s.x===undefined) return;
  zoomG.append('circle').attr('r',2.1).attr('fill','rgba(240,210,95,0.92)').attr('pointer-events','none')
    .transition().duration(1050).ease(d3.easeLinear)
    .attrTween('cx',()=>d3.interpolateNumber(s.x,t.x))
    .attrTween('cy',()=>d3.interpolateNumber(s.y,t.y))
    .on('end',function(){ d3.select(this).remove(); });
}

/* Human passion pulses — soft blue-white */
const allDotLinks=LINKS.filter(l=>l.isDot);
function humanPulse(){
  if(!allDotLinks.length) return;
  const l=allDotLinks[Math.floor(Math.random()*allDotLinks.length)];
  const s=l.source,t=l.target;
  if(!s||!t||s.x===undefined) return;
  // Bi-directional — humans send & receive from their passions
  const [from,to]=Math.random()>0.45?[s,t]:[t,s];
  zoomG.append('circle').attr('r',1.4).attr('fill','rgba(215,232,255,0.85)').attr('pointer-events','none')
    .transition().duration(850).ease(d3.easeLinear)
    .attrTween('cx',()=>d3.interpolateNumber(from.x,to.x))
    .attrTween('cy',()=>d3.interpolateNumber(from.y,to.y))
    .on('end',function(){ d3.select(this).remove(); });
}

setTimeout(()=>{
  setInterval(pulse, 280);
  setInterval(humanPulse, 160); // frequent — feels alive
},2800);
</script>
</body>
</html>
