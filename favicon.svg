<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark navy background circle -->
  <circle cx="16" cy="16" r="16" fill="#0B1C3D"/>

  <!-- Six-pointed star / asterisk symbol in gold -->
  <!-- Horizontal line -->
  <line x1="6" y1="16" x2="26" y2="16" stroke="#C4973A" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertical line -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="#C4973A" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal line (top-left to bottom-right) -->
  <line x1="9" y1="9" x2="23" y2="23" stroke="#C4973A" stroke-width="2" stroke-linecap="round"/>

  <!-- Diagonal line (top-right to bottom-left) -->
  <line x1="23" y1="9" x2="9" y2="23" stroke="#C4973A" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot for emphasis -->
  <circle cx="16" cy="16" r="2" fill="#C4973A"/>
</svg>